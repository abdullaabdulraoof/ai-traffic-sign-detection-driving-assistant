<div class="splash-container flex flex-col items-center justify-center">
    <div class="branding animate-pulse-slow">
        <div class="logo-wrapper mb-6">
            <img src="favicon.png" alt="Drive Mate Logo"
                class="w-24 h-24 lg:w-32 lg:h-32 object-contain drop-shadow-[0_0_30px_rgba(59,130,246,0.5)]">
        </div>
        <div class="text-center">
            <h1 class="text-4xl lg:text-6xl font-black text-white tracking-[0.2em] mb-2 uppercase">DRIVE MATE</h1>
            <div class="flex items-center justify-center gap-2">
                <span class="h-px w-12 bg-blue-500/50"></span>
                <p class="text-blue-500 font-bold text-xs lg:text-sm uppercase tracking-widest">AI Co-Pilot</p>
                <span class="h-px w-12 bg-blue-500/50"></span>
            </div>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div class="fixed bottom-12 flex flex-col items-center gap-4">
        <div class="flex gap-1.5">
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"></div>
        </div>
        <span class="text-[10px] text-slate-500 uppercase tracking-[0.3em] font-medium">Initializing System</span>
    </div>
</div>

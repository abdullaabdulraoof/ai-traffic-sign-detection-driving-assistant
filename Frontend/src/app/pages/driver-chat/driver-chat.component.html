<div class="flex flex-col h-full bg-slate-900 text-white rounded-xl shadow-2xl overflow-hidden border border-slate-800">
    <!-- Chat Header -->
    <div class="px-6 py-4 bg-slate-800 border-b border-slate-700 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 rounded-lg overflow-hidden border border-slate-700 bg-slate-900 flex items-center justify-center p-1">
                <img src="favicon.png" alt="Drive Mate Logo" class="w-full h-full object-contain">
            </div>
            <div>
                <h2 class="font-bold text-lg">Drive Mate Assistant</h2>
                <p class="text-xs text-slate-400 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    Online & Ready to Help
                </p>
            </div>
        </div>
    </div>

    <!-- Messages Container -->
    <div
        class="flex-1 overflow-y-auto p-6 space-y-4 bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')]">
        @for (msg of messages; track $index) {
        <div class="flex animate-in fade-in slide-in-from-bottom-2 duration-300"
            [ngClass]="msg.type === 'user' ? 'justify-end' : 'justify-start'">
            <div class="max-w-[80%] rounded-2xl px-4 py-3 shadow-md relative group"
                [ngClass]="msg.type === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-800 text-slate-100 rounded-tl-none border border-slate-700'">

                @if (msg.type === 'user' && msg.method) {
                <div
                    class="absolute -top-2 -right-2 w-5 h-5 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center text-[10px] shadow-lg">
                    <i class="fas"
                        [ngClass]="msg.method === 'voice' ? 'fa-microphone text-rose-400' : 'fa-keyboard text-sky-400'"></i>
                </div>
                }

                <p class="text-sm leading-relaxed">{{ msg.text }}</p>
                <span class="text-[10px] opacity-50 mt-1 block text-right">{{ msg.time | date:'shortTime' }}</span>
            </div>
        </div>
        }
        @if (isTyping) {
        <div class="flex justify-start animate-pulse">
            <div class="bg-slate-800 rounded-2xl px-4 py-3 rounded-tl-none border border-slate-700">
                <div class="flex gap-1">
                    <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></span>
                    <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:200ms]"></span>
                    <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:400ms]"></span>
                </div>
            </div>
        </div>
        }
    </div>

    <!-- Input Area -->
    <div class="p-4 bg-slate-800 border-t border-slate-700">
        <div class="flex gap-2 items-center">
            <button (click)="toggleListening()"
                [ngClass]="isListening ? 'bg-red-600 scale-110 shadow-red-600/50' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-600/20'"
                class="w-12 h-12 rounded-full flex items-center justify-center transition-all shadow-lg active:scale-95 group relative shrink-0">
                <i class="fas fa-microphone text-white"></i>

                @if (isListening) {
                <span class="absolute -top-1 -right-1 w-3 h-3 bg-white rounded-full animate-ping"></span>
                <div
                    class="absolute -top-12 left-1/2 -translate-x-1/2 bg-red-600 text-white text-[10px] px-2 py-1 rounded shadow-xl whitespace-nowrap animate-bounce leading-none">
                    Recording...
                </div>
                }
            </button>

            <input #chatInput [(ngModel)]="userInput" (keyup.enter)="sendMessage()"
                placeholder="{{ isListening ? 'Listening...' : 'Ask about traffic rules, safety, or navigation...' }}"
                class="flex-1 bg-slate-900 border border-slate-700 rounded-full px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder:text-slate-500">

            <button (click)="sendMessage()" [disabled]="!userInput.trim() || isListening"
                class="bg-blue-600 hover:bg-blue-500 disabled:opacity-30 disabled:cursor-not-allowed text-white w-12 h-12 rounded-full flex items-center justify-center transition-all shadow-lg active:scale-95 shrink-0">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>
</div>

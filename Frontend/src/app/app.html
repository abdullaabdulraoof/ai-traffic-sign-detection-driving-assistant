<div class="bg-[#0B0F19] text-gray-200">
  <!-- Dashboard Layout (with sidebar/navbar) -->
  <div *ngIf="showLayout" class="flex h-screen overflow-hidden">
    <!-- Sidebar / Bottom Bar (Responsive) -->
    <app-sidebar></app-sidebar>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0">
      <!-- Navbar -->
      <app-navbar [isActive]="systemState.isActive()" [fps]="systemState.fps()" (toggleCamera)="handleToggleCamera()">
      </app-navbar>

      <!-- Page Content -->
      <main class="flex-1 overflow-y-auto p-4 lg:p-8 pb-28 lg:pb-8 custom-scrollbar">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>

  <!-- Full-width Layout (for home page) -->
  <div *ngIf="!showLayout">
    <router-outlet></router-outlet>
  </div>
</div>
